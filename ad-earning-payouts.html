<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Earnings | YourProAdvisor</title>
  <style>
    :root { --bg-color: #f8fafc; --sidebar-bg: #ffffff; --text-heading: #0f172a; --text-sub: #475569; --text-logo: #1e3a8a; --primary-btn: #2563eb; --card-bg: #ffffff; --border-color: #e2e8f0; --success-green: #16a34a; }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body { background-color: var(--bg-color); display: flex; height: 100vh; overflow: hidden; }
    .sidebar { width: 260px; background: var(--sidebar-bg); border-right: 1px solid var(--border-color); padding: 24px 20px; display: flex; flex-direction: column; flex-shrink: 0; }
    .sidebar .logo { font-size: 1.4rem; font-weight: 800; color: var(--text-logo); text-decoration: none; margin-bottom: 40px; text-align: center; }
    .nav-links { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .nav-links li a { text-decoration: none; color: var(--text-sub); font-weight: 600; font-size: 0.95rem; padding: 12px 16px; border-radius: 6px; display: flex; align-items: center; gap: 12px; transition: 0.2s;}
    .nav-links li a.active, .nav-links li a:hover { background-color: #f1f5f9; color: var(--primary-btn); }
    .main-content { flex: 1; padding: 40px; overflow-y: auto; }
    
    .payout-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px; margin-bottom: 40px; }
    .payout-card { background: var(--card-bg); padding: 30px; border-radius: 8px; border: 1px solid var(--border-color); text-align: center; box-shadow: 0 1px 3px rgba(15, 23, 42, 0.05);}
    .payout-card h3 { color: var(--text-heading); font-size: 1.1rem; margin-bottom: 10px; font-weight: 700; }
    .payout-card .amount { font-size: 2.8rem; font-weight: 800; color: var(--success-green); }
    .payout-card .status { display: inline-block; padding: 5px 12px; background: #f1f5f9; border-radius: 20px; font-size: 0.85rem; margin-top: 15px; font-weight: 600; }
    .status.paid { background: #dcfce7; color: #166534; }
    .status.pending { background: #fef9c3; color: #854d0e; }
    
    @media (max-width: 768px) {
      body { flex-direction: column; overflow-y: auto; height: auto; }
      .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border-color); padding: 15px;}
      .sidebar .logo { margin-bottom: 15px; }
      .nav-links { flex-direction: row; overflow-x: auto; padding-bottom: 10px; }
      .nav-links li a { white-space: nowrap; }
      .main-content { padding: 20px; overflow-y: visible; }
    }
  </style>
</head>
<body>
  <aside class="sidebar">
    <a href="index.html" class="logo">YourProAdvisor</a>
    <ul class="nav-links">
      <li><a href="advisor-dashboard.html">📊 Advisor Hub</a></li>
      <li><a href="manage-availability.html">📅 Manage Availability</a></li>
      <li><a href="earnings-payouts.html" class="active">💰 Earnings & Payouts</a></li>
      <li><a href="client-messages.html">💬 Client Messages</a></li>
      <li><a href="profile-settings.html">⚙️ Profile Settings</a></li>
    </ul>
  </aside>

  <main class="main-content">
    <h1 style="color: var(--text-heading); margin-bottom: 30px; font-weight: 800;">Earnings & Payouts</h1>
    
    <div class="payout-grid">
      <div class="payout-card">
        <h3>This Month (Pending)</h3>
        <div class="amount">$2,450</div>
        <div class="status pending">Processing June 30th</div>
      </div>
      <div class="payout-card">
        <h3>Previous Month (Paid)</h3>
        <div class="amount">$4,120</div>
        <div class="status paid">Paid on May 31st</div>
      </div>
    </div>
  </main>
</body>
</html>
