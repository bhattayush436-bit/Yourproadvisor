<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Availability | YourProAdvisor</title>
  <style>
    :root { --bg-color: #f8fafc; --sidebar-bg: #ffffff; --text-heading: #0f172a; --text-sub: #475569; --text-logo: #1e3a8a; --primary-btn: #2563eb; --card-bg: #ffffff; --border-color: #e2e8f0; }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body { background-color: var(--bg-color); display: flex; height: 100vh; overflow: hidden; }
    .sidebar { width: 260px; background: var(--sidebar-bg); border-right: 1px solid var(--border-color); padding: 24px 20px; display: flex; flex-direction: column; flex-shrink: 0; }
    .sidebar .logo { font-size: 1.4rem; font-weight: 800; color: var(--text-logo); text-decoration: none; margin-bottom: 40px; text-align: center; }
    .nav-links { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .nav-links li a { text-decoration: none; color: var(--text-sub); font-weight: 600; font-size: 0.95rem; padding: 12px 16px; border-radius: 6px; display: flex; align-items: center; gap: 12px; transition: 0.2s;}
    .nav-links li a.active, .nav-links li a:hover { background-color: #f1f5f9; color: var(--primary-btn); }
    .main-content { flex: 1; padding: 40px; overflow-y: auto; }
    
    .schedule-card { background: var(--card-bg); padding: 24px; border-radius: 8px; border: 1px solid var(--border-color); margin-bottom: 24px; box-shadow: 0 1px 3px rgba(15, 23, 42, 0.05); }
    .schedule-card h3 { color: var(--text-heading); margin-bottom: 15px; font-weight: 700;}
    .form-row { display: flex; gap: 15px; align-items: center; margin-bottom: 15px; flex-wrap: wrap; }
    .form-group { flex: 1; min-width: 150px; }
    .form-group label { display: block; font-size: 0.85rem; color: var(--text-sub); margin-bottom: 5px; font-weight: 600; }
    .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; color: var(--text-heading); outline: none;}
    .form-group input:focus, .form-group select:focus { border-color: var(--primary-btn); }
    .btn-save { background: var(--primary-btn); color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-weight: 600; transition: background 0.2s;}
    .btn-save:hover { background: #1d4ed8; }
    
    @media (max-width: 768px) {
      body { flex-direction: column; overflow-y: auto; height: auto; }
      .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border-color); padding: 15px;}
      .sidebar .logo { margin-bottom: 15px; }
      .nav-links { flex-direction: row; overflow-x: auto; padding-bottom: 10px; }
      .nav-links li a { white-space: nowrap; }
      .main-content { padding: 20px; overflow-y: visible; }
    }
  </style>
</head>
<body>
  <aside class="sidebar">
    <a href="index.html" class="logo">YourProAdvisor</a>
    <ul class="nav-links">
      <li><a href="advisor-dashboard.html">📊 Advisor Hub</a></li>
      <li><a href="manage-availability.html" class="active">📅 Manage Availability</a></li>
      <li><a href="earnings-payouts.html">💰 Earnings & Payouts</a></li>
      <li><a href="client-messages.html">💬 Client Messages</a></li>
      <li><a href="profile-settings.html">⚙️ Profile Settings</a></li>
    </ul>
  </aside>

  <main class="main-content">
    <h1 style="color: var(--text-heading); margin-bottom: 30px; font-weight: 800;">Manage Availability</h1>
    
    <div class="schedule-card">
      <h3>Set Specific Date & Time (Override)</h3>
      <div class="form-row">
        <div class="form-group"><label>Specific Date</label><input type="date"></div>
        <div class="form-group"><label>Start Time</label><input type="time"></div>
        <div class="form-group"><label>End Time</label><input type="time"></div>
      </div>
      <button class="btn-save">Add Date Slot</button>
    </div>

    <div class="schedule-card">
      <h3>Set Recurring Weekly Days</h3>
      <div class="form-row">
        <div class="form-group">
          <label>Day of the Week</label>
          <select><option>Monday</option><option>Tuesday</option><option>Wednesday</option><option>Thursday</option><option>Friday</option><option>Saturday</option><option>Sunday</option></select>
        </div>
        <div class="form-group"><label>Start Time</label><input type="time" value="09:00"></div>
        <div class="form-group"><label>End Time</label><input type="time" value="17:00"></div>
      </div>
      <button class="btn-save">Add Recurring Slot</button>
    </div>
  </main>
</body>
</html>
