<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join as Advisor | YourProAdvisor</title>
    <style>
        :root {
            --primary: #059669;
            --dark: #0f172a;
            --light: #f8fafc;
            --border: #e2e8f0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); color: white; min-height: 100vh; padding: 6rem 2rem 2rem 2rem; }
        
        nav { background: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; position: fixed; width: 100%; top: 0; left: 0; z-index: 100; }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--primary); text-decoration: none; }
        .nav-buttons .btn-alt { text-decoration: none; color: var(--dark); font-weight: 600; }

        .panel-container { max-width: 600px; margin: 4rem auto 0 auto; text-align: center; }
        .panel-container h2 { font-size: 2.25rem; font-weight: 800; margin-bottom: 1rem; }
        .panel-container p { color: #94a3b8; margin-bottom: 2.5rem; }

        .interactive-form { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); padding: 3rem; border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.1); text-align: left; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; gap: 0; } }

        label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.5rem; color: #cbd5e1; }
        input, select, textarea { width: 100%; padding: 0.85rem 1rem; background: rgba(15, 23, 42, 0.6); border: 2px solid rgba(255, 255, 255, 0.1); border-radius: 10px; color: white; outline: none; margin-bottom: 1.5rem; }
        input:focus, select:focus, textarea:focus { border-color: var(--primary); }
        select option { background: #0f172a; color: white; }

        .btn { background: var(--primary); color: white; padding: 0.85rem; width: 100%; border-radius: 10px; font-weight: 600; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">YourProAdvisor</a>
        <div class="nav-buttons"><a href="index.html" class="btn-alt">Back to Directory</a></div>
    </nav>

    <div class="panel-container">
        <h2>Share your expertise. Set your terms.</h2>
        <p>Join our global advisory community. Monetize your skills through targeted micro-consulting blocks.</p>
        
        <form class="interactive-form" onsubmit="handleAdvisorApplication(event)">
            <div class="form-row">
                <div>
                    <label for="advName">Full Name</label>
                    <input type="text" id="advName" placeholder="Jordan Smith" required>
                </div>
                <div>
                    <label for="advEmail">Email Address</label>
                    <input type="email" id="advEmail" placeholder="you@domain.com" required>
                </div>
            </div>
            <div class="form-row">
                <div>
                    <label for="advCategory">Primary Expertise Area</label>
                    <select id="advCategory" required>
                        <option value="" disabled selected>Select Domain...</option>
                        <option value="Tech">Tech & Hardware</option>
                        <option value="Business">Business & Startups</option>
                        <option value="Career">Career Coaching</option>
                        <option value="Music">Music & Production</option>
                    </select>
                </div>
                <div>
                    <label for="advRate">Desired Rate (USD / hr)</label>
                    <input type="number" id="advRate" placeholder="75" min="10" max="500" required>
                </div>
            </div>
            <div>
                <label for="advBio">Professional Summary / Bio</label>
                <textarea id="advBio" rows="4" placeholder="Briefly describe your specialization history..." required></textarea>
            </div>
            <button type="submit" class="btn">Submit Application Profile</button>
        </form>
    </div>

    <script>
        function handleAdvisorApplication(event) {
            event.preventDefault();
            const name = document.getElementById('advName').value.trim();
            alert(`Thank you, ${name}! Your advisor application has been submitted to our reviewing team. Redirecting to marketplace.`);
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
