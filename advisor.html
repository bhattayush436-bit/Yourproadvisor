<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advisor Portal</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 1rem; }
        .dash { display: none; }
        .card { background: #1e293b; padding: 1rem; margin: 1rem 0; border-radius: 10px; }
        .value { font-size: 1.5rem; font-weight: bold; color: #34d399; }
    </style>
</head>
<body>
    <div id="onboard">
        <h2>Advisor Signup</h2>
        <input type="text" id="name" placeholder="Name" style="width:100%; padding:0.5rem; margin:0.5rem 0;">
        <button onclick="save()" style="width:100%; padding:0.5rem;">Join</button>
    </div>
    <div id="dash" class="dash">
        <h2>My Dashboard</h2>
        <div class="card">Earnings: <div class="value">₹1,44,500</div></div>
        <h3>Peer Network</h3>
        <div id="peers"></div>
    </div>
    <script>
        function save() {
            localStorage.setItem('activeAdvisor', JSON.stringify({ name: document.getElementById('name').value }));
            location.reload();
        }
        if(localStorage.getItem('activeAdvisor')) {
            document.getElementById('onboard').style.display = 'none';
            document.getElementById('dash').style.display = 'block';
            document.getElementById('peers').innerHTML = `<div class='card'>Marcus Vance<br>Earnings: ₹4,20,000</div>`;
        }
    </script>
</body>
</html>
