<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messages | YourProAdvisor</title>
  <style>
    :root { 
      --bg-color: #f8fafc; 
      --sidebar-bg: #ffffff; 
      --text-heading: #0f172a; 
      --text-sub: #475569; 
      --text-logo: #1e3a8a; 
      --primary-btn: #2563eb; 
      --card-bg: #ffffff; 
      --border-color: #e2e8f0; 
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body { background-color: var(--bg-color); display: flex; height: 100vh; overflow: hidden; }
    
    .menu-toggle { background: none; border: none; font-size: 1.8rem; color: var(--text-heading); cursor: pointer; transition: color 0.2s; padding-right: 15px; }
    .menu-toggle:hover { color: var(--primary-btn); }
    
    .sidebar { width: 260px; background: var(--sidebar-bg); border-right: 1px solid var(--border-color); padding: 24px 20px; display: flex; flex-direction: column; flex-shrink: 0; transition: all 0.3s ease; z-index: 100; }
    .sidebar.hidden { margin-left: -260px; }
    .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.5); z-index: 90; backdrop-filter: blur(2px); }
    
    .sidebar .logo { font-size: 1.4rem; font-weight: 800; color: var(--text-logo); text-decoration: none; margin-bottom: 40px; text-align: center; }
    .nav-links { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .nav-links li a { text-decoration: none; color: var(--text-sub); font-weight: 600; font-size: 0.95rem; padding: 12px 16px; border-radius: 6px; display: flex; align-items: center; gap: 12px; transition: 0.2s;}
    .nav-links li a.active, .nav-links li a:hover { background-color: #f1f5f9; color: var(--primary-btn); }
    
    .main-content { flex: 1; padding: 40px; overflow-y: auto; }
    .header { display: flex; align-items: center; margin-bottom: 30px; }
    .header-left { display: flex; align-items: center; }
    .header h1 { color: var(--text-heading); font-size: 2rem; font-weight: 800;}
    
    .message-container { background: var(--card-bg); border-radius: 8px; border: 1px solid var(--border-color); overflow: hidden; box-shadow: 0 1px 3px rgba(15, 23, 42, 0.05); min-height: 400px; display: flex; align-items: center; justify-content: center; }
    
    /* Premium Empty State Styles */
    .empty-state { text-align: center; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
    .empty-state-icon { width: 80px; height: 80px; background: #f1f5f9; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; margin-bottom: 20px; color: #94a3b8; }
    .empty-state h3 { color: var(--text-heading); font-size: 1.25rem; font-weight: 700; margin-bottom: 10px; }
    .empty-state p { color: var(--text-sub); font-size: 0.95rem; max-width: 320px; line-height: 1.5; }
    
    @media (max-width: 768px) {
      .sidebar { position: fixed; left: -260px; height: 100vh; box-shadow: 2px 0 10px rgba(0,0,0,0.1); }
      .sidebar.active { left: 0; margin-left: 0; }
      .sidebar-overlay.active { display: block; }
      .main-content { padding: 20px; }
      .header h1 { font-size: 1.5rem; }
      .message-container { min-height: 300px; }
    }
  </style>
</head>
<body>
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

  <aside class="sidebar" id="sidebar">
    <a href="index.html" class="logo">YourProAdvisor</a>
    <ul class="nav-links">
      <li><a href="advisor-dashboard.html">📊 Advisor Hub</a></li>
      <li><a href="manage-availability.html">📅 Manage Availability</a></li>
      <li><a href="earnings-payouts.html">💰 Earnings & Payouts</a></li>
      <li><a href="client-messages.html" class="active">💬 Client Messages</a></li>
      <li><a href="profile-settings.html">⚙️ Profile Settings</a></li>
    </ul>
  </aside>

  <main class="main-content">
    <div class="header">
      <div class="header-left">
        <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
        <h1>Client Messages</h1>
      </div>
    </div>
    
    <div class="message-container">
      <!-- Real Application Empty State -->
      <div class="empty-state">
        <div class="empty-state-icon">📭</div>
        <h3>No messages yet</h3>
        <p>When clients reach out to you or book a session, their messages and inquiries will appear right here.</p>
      </div>
    </div>
  </main>

  <script>
    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebarOverlay');
      if (window.innerWidth <= 768) { 
        sidebar.classList.toggle('active'); 
        overlay.classList.toggle('active'); 
      } else { 
        sidebar.classList.toggle('hidden'); 
      }
    }
  </script>
</body>
</html>
