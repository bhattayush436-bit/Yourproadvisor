<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YourProAdvisor | Elite Consultation</title>
    <style>
        :root {
            --primary: #059669; --dark: #0f172a; --light: #f8fafc;
            --brand-gradient: linear-gradient(135deg, #059669 0%, #3b82f6 100%);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: var(--light); color: var(--dark); line-height: 1.6; padding-top: 4rem; }

        nav { background: white; padding: 1rem; display: flex; justify-content: space-between; align-items: center; position: fixed; width: 100%; top: 0; z-index: 100; border-bottom: 1px solid #e2e8f0; }
        .logo { font-size: 1.2rem; font-weight: 800; color: var(--primary); text-decoration: none; }
        .nav-buttons a { font-size: 0.8rem; font-weight: 600; text-decoration: none; color: var(--dark); margin-left: 0.5rem; }

        .hero { padding: 3rem 1rem; text-align: center; background: #eff6ff; }
        .hero h1 { font-size: 1.7rem; margin-bottom: 1rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1rem; padding: 1rem; }
        .card { background: white; padding: 1.5rem; border-radius: 12px; border: 1px solid #e2e8f0; }
        .btn { display: block; width: 100%; padding: 0.8rem; background: var(--primary); color: white; text-align: center; border-radius: 8px; text-decoration: none; font-weight: 600; margin-top: 1rem; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">YourProAdvisor</a>
        <div class="nav-buttons">
            <a href="user.html">Login</a>
            <a href="advisor.html" style="background:var(--primary); color:white; padding:0.5rem; border-radius:5px;">Advisor</a>
        </div>
    </nav>
    <section class="hero">
        <h1>Connect with elite professionals</h1>
        <p>Expert consultation at your fingertips.</p>
    </section>
    <div class="grid" id="marketplace">
        <div class="card"><h3>Arjan Dev</h3><p>Tech Expert</p><a href="#" class="btn">Book</a></div>
        <div class="card"><h3>Marcus Vance</h3><p>Business Expert</p><a href="#" class="btn">Book</a></div>
        <div class="card"><h3>Elena Rostova</h3><p>Career Coach</p><a href="#" class="btn">Book</a></div>
    </div>
    <script>
        window.onload = function() {
            const user = JSON.parse(localStorage.getItem('activeUser'));
            if (user) { document.querySelector('a[href="user.html"]').innerText = "Dashboard"; }
        };
    </script>
</body>
</html>
