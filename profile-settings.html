<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile Settings | YourProAdvisor</title>
  <style>
    /* --- Shared Core Variables & Responsive Layout --- */
    :root { 
      --bg-color: #f8fafc; 
      --sidebar-bg: #ffffff; 
      --text-heading: #0f172a; 
      --text-sub: #475569; 
      --text-logo: #1e3a8a; 
      --primary-btn: #2563eb; 
      --card-bg: #ffffff; 
      --border-color: #e2e8f0; 
      --danger-color: #ef4444;
      --danger-hover: #dc2626;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body { background-color: var(--bg-color); display: flex; height: 100vh; overflow: hidden; }
    
    /* Sidebar (Note: Logout button is removed here) */
    .sidebar { width: 260px; background: var(--sidebar-bg); border-right: 1px solid var(--border-color); padding: 24px 20px; display: flex; flex-direction: column; flex-shrink: 0; }
    .sidebar .logo { font-size: 1.4rem; font-weight: 800; color: var(--text-logo); text-decoration: none; margin-bottom: 40px; text-align: center; }
    .nav-links { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .nav-links li a { text-decoration: none; color: var(--text-sub); font-weight: 600; font-size: 0.95rem; padding: 12px 16px; border-radius: 6px; display: flex; align-items: center; gap: 12px; transition: 0.2s; }
    .nav-links li a.active, .nav-links li a:hover { background-color: #f1f5f9; color: var(--primary-btn); }
    
    .main-content { flex: 1; padding: 40px; overflow-y: auto; }
    
    /* Settings Specific Styles */
    .settings-card { background: var(--card-bg); padding: 30px; border-radius: 8px; border: 1px solid var(--border-color); margin-bottom: 24px; max-width: 800px; }
    .settings-card h3 { color: var(--text-heading); margin-bottom: 20px; font-size: 1.2rem; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
    
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 0.9rem; color: var(--text-sub); margin-bottom: 8px; font-weight: 600; }
    .form-group input, .form-group textarea { width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 6px; color: var(--text-heading); font-size: 0.95rem; }
    .form-group textarea { resize: vertical; min-height: 100px; }
    
    .btn-save { background: var(--primary-btn); color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-weight: 600; transition: background 0.2s; }
    .btn-save:hover { background: #1d4ed8; }
    
    /* Log Out Action Styling */
    .account-actions { display: flex; justify-content: space-between; align-items: center; padding-top: 10px; }
    .logout-btn-main { background: #fee2e2; color: var(--danger-color); padding: 12px 24px; border-radius: 6px; text-decoration: none; font-weight: 600; transition: all 0.2s; display: inline-block; border: 1px solid #fca5a5; }
    .logout-btn-main:hover { background: var(--danger-color); color: white; border-color: var(--danger-hover); }

    /* Mobile Responsiveness */
    @media (max-width: 768px) {
      body { flex-direction: column; overflow-y: auto; height: auto; }
      .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border-color); padding: 15px; }
      .sidebar .logo { margin-bottom: 15px; }
      .nav-links { flex-direction: row; overflow-x: auto; padding-bottom: 10px; }
      .nav-links li a { white-space: nowrap; }
      .main-content { padding: 20px; overflow-y: visible; }
      .account-actions { flex-direction: column; gap: 15px; align-items: stretch; text-align: center; }
    }
  </style>
</head>
<body>
  <aside class="sidebar">
    <a href="index.html" class="logo">YourProAdvisor</a>
    <ul class="nav-links">
      <li><a href="advisor-dashboard.html">📊 Advisor Hub</a></li>
      <li><a href="manage-availability.html">📅 Manage Availability</a></li>
      <li><a href="earnings-payouts.html">💰 Earnings & Payouts</a></li>
      <li><a href="client-messages.html">💬 Client Messages</a></li>
      <li><a href="profile-settings.html" class="active">⚙️ Profile Settings</a></li>
    </ul>
    </aside>

  <main class="main-content">
    <h1 style="color: var(--text-heading); margin-bottom: 30px;">Profile Settings</h1>
    
    <div class="settings-card">
      <h3>Public Profile</h3>
      <div class="form-group">
        <label>Display Name</label>
        <input type="text" value="Dr. Ananya Sharma">
      </div>
      <div class="form-group">
        <label>Professional Title</label>
        <input type="text" value="Senior VLSI Engineer & Consultant">
      </div>
      <div class="form-group">
        <label>Bio</label>
        <textarea>10+ years of experience in hardware design, focusing on Verilog and front-end verification...</textarea>
      </div>
      <button class="btn-save">Save Changes</button>
    </div>

    <div class="settings-card" style="border-color: #fca5a5; background: #fff5f5;">
      <h3 style="color: var(--danger-color); border-color: #fca5a5;">Account Actions</h3>
      <p style="color: var(--text-sub); font-size: 0.9rem; margin-bottom: 20px;">Manage your session and account security here.</p>
      
      <div class="account-actions">
        <a href="index.html" class="logout-btn-main">Log Out of YourProAdvisor</a>
      </div>
    </div>
  </main>
</body>
</html>
