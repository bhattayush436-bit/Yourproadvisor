<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile Settings | YourProAdvisor</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <script>
    if (localStorage.getItem('theme') === 'dark') { document.documentElement.setAttribute('data-theme', 'dark'); }
  </script>

  <style>
    :root { 
      --bg-color: #f8fafc; --sidebar-bg: #ffffff; --text-heading: #0f172a; 
      --text-sub: #475569; --primary-btn: #2563eb; --card-bg: #ffffff; 
      --border-color: #e2e8f0; --primary-gradient: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); 
    }
    [data-theme="dark"] {
      --bg-color: #0f172a; --sidebar-bg: #1e293b; --text-heading: #f8fafc;
      --text-sub: #94a3b8; --card-bg: #1e293b; --border-color: #334155;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body { background-color: var(--bg-color); display: flex; height: 100vh; overflow: hidden; transition: background-color 0.3s ease; }
    
    .menu-toggle { background: none; border: none; font-size: 1.8rem; color: var(--text-heading); cursor: pointer; transition: color 0.2s; padding-right: 15px; }
    
    .sidebar { width: 260px; background: var(--sidebar-bg); border-right: 1px solid var(--border-color); padding: 24px 20px; display: flex; flex-direction: column; flex-shrink: 0; transition: all 0.3s ease; z-index: 100; overflow-y: auto;}
    .sidebar.hidden { margin-left: -260px; }
    .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.5); z-index: 90; backdrop-filter: blur(2px); }
    .sidebar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
    .sidebar .logo { display: block; font-size: 1.5rem; font-weight: 800; color: var(--text-heading); text-decoration: none; letter-spacing: -0.5px; }
    .sidebar .logo .highlight { background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: inline-block; }
    .sidebar-close-btn { display: none; background: none; border: none; font-size: 2rem; color: var(--text-sub); cursor: pointer; line-height: 1; }
    
    .nav-links { list-style: none; display: flex; flex-direction: column; gap: 8px; flex: 1; }
    .nav-links li a { text-decoration: none; color: var(--text-sub); font-weight: 600; font-size: 0.9rem; padding: 10px 14px; border-radius: 6px; display: flex; align-items: center; gap: 10px; transition: 0.2s;}
    .nav-links li a.active, .nav-links li a:hover { background-color: var(--border-color); color: var(--primary-btn); }
    
    .theme-toggle-btn { margin-top: 20px; padding: 12px 14px; background: transparent; border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-heading); font-weight: 600; font-size: 0.9rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.2s; width: 100%; }
    .theme-toggle-btn:hover { background: var(--border-color); }

    .main-content { flex: 1; padding: 40px; overflow-y: auto; }
    .header { display: flex; align-items: center; margin-bottom: 30px; }
    .header h1 { color: var(--text-heading); font-size: 2rem; font-weight: 800;}

    /* Form Styles */
    .settings-card { background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border-color); padding: 30px; max-width: 800px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; color: var(--text-heading); font-weight: 600; font-size: 0.9rem; margin-bottom: 8px; }
    .form-group input, .form-group textarea { width: 100%; padding: 12px 15px; border: 1px solid var(--border-color); border-radius: 8px; background: var(--bg-color); color: var(--text-heading); font-family: 'Inter', sans-serif; font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
    .form-group input:focus, .form-group textarea:focus { border-color: var(--primary-btn); }
    .form-group textarea { resize: vertical; min-height: 100px; }
    
    .btn-save { background: var(--primary-btn); color: white; border: none; padding: 14px 28px; border-radius: 8px; font-weight: 600; font-size: 1rem; cursor: pointer; transition: 0.2s; margin-top: 10px;}
    .btn-save:hover { background: #1d4ed8; }

    @media (max-width: 768px) {
      .sidebar { position: fixed; left: -260px; height: 100vh; box-shadow: 2px 0 10px rgba(0,0,0,0.1); }
      .sidebar.active { left: 0; }
      .sidebar-overlay.active { display: block; }
      .main-content { padding: 20px; }
      .sidebar-close-btn { display: block; }
      .sidebar-header { margin-bottom: 30px; }
      .sidebar .logo { font-size: 1.3rem; }
      .nav-links li a { font-size: 0.85rem; padding: 10px 12px; }
      .theme-toggle-btn { font-size: 0.85rem; padding: 10px; }
      .header h1 { font-size: 1.5rem; }
      
      .settings-card { padding: 20px; }
      .form-group label { font-size: 0.85rem; }
      .form-group input, .form-group textarea { padding: 10px; font-size: 0.85rem; }
      .btn-save { width: 100%; font-size: 0.95rem; }
    }
  </style>
</head>
<body>
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <a href="index.html" class="logo">Your<span class="highlight">Pro</span>Advisor</a>
      <button class="sidebar-close-btn" onclick="toggleSidebar()">&times;</button>
    </div>
    
    <ul class="nav-links">
      <li><a href="analytics-dashboard.html">📊 Analytics Dashboard</a></li>
      <li><a href="manage-availability.html">📅 Manage Availability</a></li>
      <li><a href="upcoming-sessions.html">🎥 Upcoming Sessions</a></li>
      <li><a href="earnings-payouts.html">💰 Earnings & Payouts</a></li>
      <li><a href="client-messages.html">💬 Client Messages</a></li>
      <li><a href="reviews-ratings.html">⭐ Reviews & Ratings</a></li>
      <li><a href="advisor-notifications.html">🔔 Notifications Center</a></li>
      <li><a href="achievements-badges.html">🏆 Achievements & Badges</a></li>
      <li><a href="advisor-support.html">❓ Support & Help</a></li>
      <li><a href="profile-settings.html" class="active">⚙️ Profile Settings</a></li>
    </ul>
    <button class="theme-toggle-btn" id="themeToggleBtn" onclick="toggleTheme()">🌙 Switch to Dark Mode</button>
  </aside>

  <main class="main-content">
    <div class="header">
      <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
      <h1>Profile Settings</h1>
    </div>

    <div class="settings-card">
      <form>
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" value="Ayush Bhat">
        </div>
        
        <div class="form-group">
          <label>Professional Headline</label>
          <input type="text" value="Senior Engineer & Mentor">
        </div>

        <div class="form-group">
          <label>Hourly Mentorship Rate ($ USD)</label>
          <input type="number" value="80">
        </div>
        
        <div class="form-group">
          <label>LinkedIn URL</label>
          <input type="url" value="https://linkedin.com/in/ayushbhat">
        </div>

        <div class="form-group">
          <label>About Me (Bio)</label>
          <textarea>I have over 10 years of industry experience and specialize in career transitions and technical interview prep...</textarea>
        </div>
        
        <button type="button" class="btn-save">💾 Save Changes</button>
      </form>
    </div>
  </main>

  <script>
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('sidebarOverlay').classList.toggle('active'); }
    const themeToggleBtn = document.getElementById('themeToggleBtn');
    if (localStorage.getItem('theme') === 'dark') themeToggleBtn.innerHTML = '☀️ Switch to Light Mode';
    function toggleTheme() {
      if (document.documentElement.getAttribute('data-theme') === 'dark') {
        document.documentElement.removeAttribute('data-theme'); localStorage.setItem('theme', 'light'); themeToggleBtn.innerHTML = '🌙 Switch to Dark Mode';
      } else {
        document.documentElement.setAttribute('data-theme', 'dark'); localStorage.setItem('theme', 'dark'); themeToggleBtn.innerHTML = '☀️ Switch to Light Mode';
      }
    }
  </script>
</body>
</html>
