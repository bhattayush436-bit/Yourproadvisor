<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Onboarding | YourProAdvisor</title>
    <style>
        :root {
            --primary: #059669;
            --dark: #0f172a;
            --light: #f8fafc;
            --border: #e2e8f0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: linear-gradient(135deg, #064e3b 0%, #022c22 100%); color: white; min-height: 100vh; padding: 6rem 2rem 2rem 2rem; }
        
        nav { background: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; position: fixed; width: 100%; top: 0; left: 0; z-index: 100; }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--primary); text-decoration: none; }
        .nav-buttons .btn-alt { text-decoration: none; color: var(--dark); font-weight: 600; }

        .panel-container { max-width: 600px; margin: 4rem auto 0 auto; text-align: center; }
        .panel-container h2 { font-size: 2.25rem; font-weight: 800; margin-bottom: 1rem; }
        .panel-container p { color: #94a3b8; margin-bottom: 2.5rem; }

        .interactive-form { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); padding: 3rem; border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.1); text-align: left; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; gap: 0; } }

        label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.5rem; color: #cbd5e1; }
        input, select { width: 100%; padding: 0.85rem 1rem; background: rgba(15, 23, 42, 0.6); border: 2px solid rgba(255, 255, 255, 0.1); border-radius: 10px; color: white; outline: none; margin-bottom: 1.5rem; }
        input:focus, select:focus { border-color: var(--primary); }
        select option { background: #0f172a; color: white; }

        .btn { background: var(--primary); color: white; padding: 0.85rem; width: 100%; border-radius: 10px; font-weight: 600; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">YourProAdvisor</a>
        <div class="nav-buttons"><a href="index.html" class="btn-alt">Back to Directory</a></div>
    </nav>

    <div class="panel-container">
        <h2>Create Your Member Account</h2>
        <p>Set up your profile to manage consultation blocks, log histories, and view smart match selections.</p>
        
        <form class="interactive-form" onsubmit="handleUserRegistration(event)">
            <div class="form-row">
                <div>
                    <label for="usrName">Your Name</label>
                    <input type="text" id="usrName" placeholder="Alex Rivera" required>
                </div>
                <div>
                    <label for="usrEmail">Email Address</label>
                    <input type="email" id="usrEmail" placeholder="alex@example.com" required>
                </div>
            </div>
            <div class="form-row">
                <div>
                    <label for="usrField">Your Field / Interest Focus</label>
                    <select id="usrField">
                        <option value="Entrepreneurship">Entrepreneurship & Startups</option>
                        <option value="Engineering">Engineering & Design</option>
                        <option value="Creative Arts">Creative Arts & Audio</option>
                        <option value="General">General Upskilling</option>
                    </select>
                </div>
                <div>
                    <label for="usrPassword">Password</label>
                    <input type="password" id="usrPassword" placeholder="••••••••" required>
                </div>
            </div>
            <button type="submit" class="btn">Complete Account Registration</button>
        </form>
    </div>

    <script>
        function handleUserRegistration(event) {
            event.preventDefault();
            const name = document.getElementById('usrName').value.trim();
            alert(`Welcome aboard, ${name}! Your account has been initialized. Redirecting you to the home marketplace.`);
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
