<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Portal | YourProAdvisor</title>
    <style>
        :root {
            --primary: #059669;
            --primary-hover: #047857;
            --dark: #0f172a;
            --light: #f8fafc;
            --border: #e2e8f0;
            --gray-text: #64748b;
            --card-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
            --brand-gradient: linear-gradient(135deg, #059669 0%, #3b82f6 100%);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: #f1f5f9; color: var(--dark); min-height: 100vh; padding-top: 5.5rem; }
        
        /* FIXED MOBILE NAVBAR FOR USER CORE PAGE */
        nav { 
            background: white; 
            padding: 0.85rem 1rem; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: fixed; 
            width: 100%; top: 0; left: 0; z-index: 100; 
            border-bottom: 1px solid var(--border); 
            gap: 0.5rem;
        }
        .logo { 
            font-size: 1.15rem; font-weight: 800; 
            background: var(--brand-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none; 
            white-space: nowrap;
            flex-shrink: 0;
        }
        .nav-buttons {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            justify-content: flex-end;
            flex-wrap: nowrap;
        }
        .nav-buttons .btn-alt { 
            text-decoration: none; color: var(--dark); 
            font-weight: 600; font-size: 0.8rem; 
            background: none; border: none; cursor: pointer; 
            white-space: nowrap;
            padding: 0.4rem 0.5rem;
        }

        .auth-container { max-width: 100%; margin: 2rem auto; padding: 0 1rem; }
        .interactive-form { background: white; padding: 2rem 1.25rem; border-radius: 20px; box-shadow: var(--card-shadow); border: 1px solid var(--border); }
        .interactive-form h2 { font-size: 1.6rem; font-weight: 800; margin-bottom: 0.5rem; text-align: center; }
        .interactive-form p { color: var(--gray-text); text-align: center; margin-bottom: 1.5rem; font-size: 0.9rem; }

        label { display: block; font-size: 0.8rem; font-weight: 700; margin-bottom: 0.4rem; }
        input, select { width: 100%; padding: 0.85rem; background: var(--light); border: 2px solid var(--border); border-radius: 10px; outline: none; margin-bottom: 1.25rem; font-size: 0.95rem; }
        input:focus, select:focus { border-color: var(--primary); }

        .btn { background: var(--primary); color: white; padding: 0.85rem; width: 100%; border-radius: 10px; font-weight: 600; border: none; cursor: pointer; font-size: 0.95rem; text-align: center; text-decoration: none; display: block;}

        .dashboard-container { display: none; margin: 1.5rem auto; padding: 0 1rem; max-width: 1100px; }
        .welcome-header { margin-bottom: 1.5rem; background: white; padding: 1.5rem; border-radius: 16px; border: 1px solid var(--border); box-shadow: var(--card-shadow); }
        .welcome-header h2 { font-size: 1.5rem; font-weight: 800; }
        .welcome-header p { color: var(--gray-text); font-size: 0.9rem; margin-top: 0.25rem; }
        
        .dashboard-grid { display: grid; grid-template-columns: 1fr; gap: 1.25rem; }
        .match-card { background: white; border-radius: 16px; padding: 1.5rem; border: 1px solid var(--border); box-shadow: var(--card-shadow); display: flex; flex-direction: column; justify-content: space-between; }
        .match-tag { align-self: flex-start; background: #e0f2fe; color: #0369a1; padding: 0.25rem 0.65rem; border-radius: 30px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; margin-bottom: 0.75rem; }
        .match-card h3 { font-size: 1.2rem; font-weight: 700; margin-bottom: 0.4rem; }
        .match-card .bio { color: var(--gray-text); font-size: 0.85rem; margin-bottom: 1.25rem; }
        
        .metric-row { display: flex; justify-content: space-between; background: var(--light); padding: 0.6rem 0.85rem; border-radius: 8px; margin-bottom: 0.4rem; font-size: 0.8rem; }
        .metric-label { font-weight: 600; color: var(--gray-text); }
        .metric-value { font-weight: 700; }
        .rating-badge { color: #b45309; background: #fef3c7; padding: 0.1rem 0.3rem; border-radius: 4px; font-weight: 800; }

        @media (min-width: 768px) {
            body { padding-top: 5rem; }
            nav { padding: 1rem 2rem; gap: 0; }
            .logo { font-size: 1.5rem; }
            .nav-buttons { gap: 0; }
            .nav-buttons .btn-alt { margin-left: 1.5rem; padding: 0; font-size: 0.95rem; }
            .auth-container { max-width: 550px; margin: 4rem auto; }
            .interactive-form { padding: 3rem; }
            .dashboard-container { margin: 2rem auto; padding: 0; }
            .welcome-header { padding: 2rem; }
            .dashboard-grid { grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 1.5rem; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">YourProAdvisor</a>
        <div class="nav-buttons">
            <button class="btn-alt" id="logoutBtn" style="display:none;" onclick="logout()">Logout</button>
            <a href="index.html" class="btn-alt">Marketplace</a>
        </div>
    </nav>

    <div class="auth-container" id="authWindow">
        <form class="interactive-form" onsubmit="loginUser(event)">
            <h2>Welcome Back</h2>
            <p>Access your personalized profile hub window layout metrics.</p>
            <div>
                <label for="usrName">Your Full Name</label>
                <input type="text" id="usrName" placeholder="Alex Rivera" required>
            </div>
            <div>
                <label for="usrField">Your Target Focus Field</label>
                <select id="usrField">
                    <option value="Tech & Hardware">Tech & Hardware Engineering</option>
                    <option value="Business & Startups">Business & Startups</option>
                    <option value="Career Coaching">Career Coaching</option>
                    <option value="Music & Production">Music & Production</option>
                </select>
            </div>
            <button type="submit" class="btn">Login & Launch Dashboard</button>
        </form>
    </div>

    <div class="dashboard-container" id="dashboardWindow">
        <div class="welcome-header">
            <h2 id="greetMessage">Welcome Back</h2>
            <p id="focusMessage">Displaying verified elite advisors optimized for your preference track.</p>
        </div>
        <h3 style="font-size: 1.2rem; font-weight: 800; margin-bottom: 1rem;">Recommended Advisors For You</h3>
        <div class="dashboard-grid" id="matchedAdvisorsContainer"></div>
    </div>

    <script>
        const mockAdvisors = [
            { name: "Arjan Dev", domain: "Tech & Hardware", bio: "VLSI Frontend Architecture specialist and optimized RTL verification expert.", sessions: 142, rating: "4.9", exp: "12 Years" },
            { name: "Ananya Iyer", domain: "Tech & Hardware", bio: "Embedded Systems design engineer and core firmware microprocessor architect.", sessions: 98, rating: "4.8", exp: "8 Years" },
            { name: "Marcus Vance", domain: "Business & Startups", bio: "Venture strategist guiding pitch desk architecture and funding pipeline scaling execution.", sessions: 210, rating: "5.0", exp: "15 Years" },
            { name: "Vikram Malhotra", domain: "Business & Startups", bio: "Growth canvas expert focused on financial scalability models and asset operations.", sessions: 85, rating: "4.7", exp: "9 Years" },
            { name: "Elena Rostova", domain: "Career Coaching", bio: "Executive recruiter guiding salary negotiation tracks and mock interview evaluations.", sessions: 340, rating: "4.9", exp: "14 Years" },
            { name: "Devon Cole", domain: "Music & Production", bio: "Platinum tracking designer specializing in analog stem dynamics and sound synthesis structures.", sessions: 115, rating: "4.9", exp: "10 Years" }
        ];

        window.onload = function() {
            const activeUser = JSON.parse(localStorage.getItem('activeUser'));
            if (activeUser) renderDashboard(activeUser);
        };

        function loginUser(event) {
            event.preventDefault();
            const userData = { name: document.getElementById('usrName').value.trim(), focus: document.getElementById('usrField').value };
            localStorage.setItem('activeUser', JSON.stringify(userData));
            renderDashboard(userData);
        }

        function renderDashboard(user) {
            document.getElementById('authWindow').style.display = 'none';
            document.getElementById('dashboardWindow').style.display = 'block';
            document.getElementById('logoutBtn').style.display = 'inline-block';
            document.getElementById('greetMessage').innerText = `👋 Welcome Back, ${user.name}`;
            const container = document.getElementById('matchedAdvisorsContainer'); container.innerHTML = "";
            const matches = mockAdvisors.filter(adv => adv.domain === user.focus);
            
            matches.forEach(adv => {
                container.innerHTML += `
                    <div class="match-card">
                        <div><span class="match-tag">${adv.domain}</span>  <h3>${adv.name}</h3><p class="bio">${adv.bio}</p></div>
                        <div>
                            <div class="metric-row"><span class="metric-label">Experience</span><span class="metric-value">${adv.exp}</span></div>
                            <div class="metric-row"><span class="metric-label">Sessions</span><span class="metric-value">${adv.sessions} completed</span></div>
                            <div class="metric-row"><span class="metric-label">Rating</span><span class="metric-value"><span class="rating-badge">★ ${adv.rating}</span></span></div>
                            <a href="index.html#marketplace" class="btn" style="margin-top:1rem;">Book Consultation Slot</a>
                        </div>
                    </div>`;
            });
        }
        function logout() { localStorage.removeItem('activeUser'); window.location.reload(); }
    </script>
</body>
</html>
