<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Portal</title>
    <style>
        body { font-family: sans-serif; background: #f1f5f9; padding: 1rem; }
        .form-box { background: white; padding: 2rem; border-radius: 15px; max-width: 400px; margin: 2rem auto; }
        input, select { width: 100%; padding: 0.8rem; margin: 0.5rem 0; border: 1px solid #ccc; border-radius: 5px; }
        .btn { width: 100%; padding: 0.8rem; background: #059669; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="form-box" id="authBox">
        <h2>Login</h2>
        <input type="text" id="name" placeholder="Name">
        <select id="field"><option>Tech</option><option>Business</option></select>
        <button class="btn" onclick="login()">Login</button>
    </div>
    <div id="dash" style="display:none;"><h2>Welcome!</h2><div id="content"></div></div>
    <script>
        function login() {
            const user = { name: document.getElementById('name').value, field: document.getElementById('field').value };
            localStorage.setItem('activeUser', JSON.stringify(user));
            location.reload();
        }
        if(localStorage.getItem('activeUser')) {
            document.getElementById('authBox').style.display = 'none';
            document.getElementById('dash').style.display = 'block';
            document.getElementById('content').innerHTML = "View your recommended advisors here.";
        }
    </script>
</body>
</html>
